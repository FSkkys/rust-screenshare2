<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rust Screen Share</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/peerjs@1.5.0/dist/peerjs.min.js"></script>
<style>
/* ==== STYLES KEPT FROM ORIGINAL ==== */
:root {
  --orange: #FF6B1A;
  --orange-light: #FF8C42;
  --orange-glow: rgba(255, 107, 26, 0.5);
  --blue: #0A84FF;
  --blue-dark: #0056CC;
  --blue-glow: rgba(10, 132, 255, 0.4);
  --bg-dark: rgba(5, 10, 20, 0.82);
  --text: #E8F0FF;
  --text-muted: rgba(232, 240, 255, 0.5);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: url('https://imgpx.com/en/Hbovev1FKimJ.jpg') center center / cover no-repeat fixed;
  font-family: 'Rajdhani', sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 40px 20px 60px;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, rgba(0,10,30,0.75) 0%, rgba(10,5,0,0.7) 100%);
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,107,26,0.018) 3px, rgba(255,107,26,0.018) 4px);
  pointer-events: none;
  z-index: 1;
}
.wrapper {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 860px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}
header { text-align: center; position: relative; padding: 16px 24px; }
.logo-tag {
  display: inline-block;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--orange);
  border: 1px solid var(--orange);
  padding: 4px 12px;
  margin-bottom: 18px;
  animation: fadeSlideDown 0.6s ease both;
}
h1 {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: clamp(2rem, 6vw, 3.4rem);
  line-height: 1.05;
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--orange-light) 0%, var(--blue) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: fadeSlideDown 0.7s 0.1s ease both;
}
.subtitle {
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 10px;
  animation: fadeSlideDown 0.7s 0.2s ease both;
}
header .bracket { position: absolute; width: 18px; height: 18px; opacity: 0.6; }
header .bracket.tl { top: 0; left: 0; border-top: 2px solid var(--orange); border-left: 2px solid var(--orange); }
header .bracket.tr { top: 0; right: 0; border-top: 2px solid var(--blue); border-right: 2px solid var(--blue); }
header .bracket.bl { bottom: 0; left: 0; border-bottom: 2px solid var(--orange); border-left: 2px solid var(--orange); }
header .bracket.br { bottom: 0; right: 0; border-bottom: 2px solid var(--blue); border-right: 2px solid var(--blue); }
.panel {
  width: 100%;
  background: var(--bg-dark);
  border: 1px solid rgba(255, 107, 26, 0.25);
  border-radius: 4px;
  padding: 28px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
  position: relative;
  overflow: hidden;
  animation: fadeSlideUp 0.7s 0.3s ease both;
}
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--orange), var(--blue));
}
.status-group { display: flex; align-items: center; gap: 12px; }
.status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: background 0.4s, box-shadow 0.4s;
}
.status-dot.active {
  background: #2EFF7A;
  box-shadow: 0 0 10px #2EFF7A, 0 0 20px rgba(46,255,122,0.4);
  animation: pulse-dot 1.5s infinite;
}
.status-label {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  transition: color 0.4s;
}
.status-label.active { color: #2EFF7A; }
.btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
.btn {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 12px 28px;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.3s;
}
.btn::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.1); opacity: 0; transition: opacity 0.2s; }
.btn:hover::after { opacity: 1; }
.btn:active { transform: scale(0.97); }
.btn-start {
  background: linear-gradient(135deg, var(--orange) 0%, var(--orange-light) 100%);
  color: #fff;
  box-shadow: 0 4px 24px var(--orange-glow);
}
.btn-start:hover { box-shadow: 0 6px 32px var(--orange-glow), 0 0 0 1px var(--orange); transform: translateY(-1px); }
.btn-stop {
  background: transparent;
  color: var(--blue);
  border: 1px solid var(--blue);
  box-shadow: 0 0 12px var(--blue-glow);
}
.btn-stop:hover { background: rgba(10,132,255,0.12); box-shadow: 0 0 20px var(--blue-glow); }
.btn-stop:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-stop:disabled:hover { background: transparent; box-shadow: 0 0 12px var(--blue-glow); transform: none; }
.video-container {
  width: 100%;
  background: rgba(0,5,15,0.9);
  border: 1px solid rgba(10, 132, 255, 0.2);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
  min-height: 420px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeSlideUp 0.7s 0.4s ease both;
}
.video-container::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--orange));
}
.corner { position: absolute; width: 20px; height: 20px; z-index: 3; }
.corner.tl { top: 8px; left: 8px; border-top: 2px solid var(--blue); border-left: 2px solid var(--blue); }
.corner.tr { top: 8px; right: 8px; border-top: 2px solid var(--orange); border-right: 2px solid var(--orange); }
.corner.bl { bottom: 8px; left: 8px; border-bottom: 2px solid var(--blue); border-left: 2px solid var(--blue); }
.corner.br { bottom: 8px; right: 8px; border-bottom: 2px solid var(--orange); border-right: 2px solid var(--orange); }
.idle-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  opacity: 0.4;
  user-select: none;
}
.idle-placeholder.hidden { display: none; }
.idle-icon {
  width: 64px; height: 64px;
  border: 2px solid var(--blue);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.idle-icon::before { content: ''; width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--orange); }
.idle-icon::after {
  content: '';
  position: absolute;
  bottom: -10px; left: 50%;
  transform: translateX(-50%);
  width: 18px; height: 8px;
  border-left: 2px solid var(--blue);
  border-right: 2px solid var(--blue);
  border-bottom: 2px solid var(--blue);
}
.idle-text {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
}
#screen, #friendScreen {
  width: 100%;
  height: 100%;
  min-height: 420px;
  object-fit: contain;
  display: none;
  border-radius: 3px;
}
.info-bar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: rgba(5,10,20,0.6);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 3px;
  animation: fadeSlideUp 0.7s 0.5s ease both;
  flex-wrap: wrap;
  gap: 8px;
}
.info-item { display: flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
.info-item span.val { color: var(--orange-light); font-family: 'Orbitron', monospace; font-size: 10px; }
.divider { width: 1px; height: 16px; background: rgba(255,255,255,0.1); }
.rec-badge { display: none; align-items: center; gap: 6px; font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 2px; color: #FF3B3B; text-transform: uppercase; }
.rec-badge.visible { display: flex; }
.rec-dot { width: 7px; height: 7px; border-radius: 50%; background: #FF3B3B; animation: pulse-dot 1s infinite; }
@keyframes fadeSlideDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeSlideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 540px) {
  .panel { flex-direction: column; align-items: flex-start; }
  .info-bar { flex-direction: column; align-items: flex-start; }
  .divider { display: none; }
}
</style>
<body>
<div class="wrapper">
<header>
  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>
  <div class="logo-tag">⬡ Rust Engine</div>
  <h1>Screen Share</h1>
  <p class="subtitle">Broadcast · Capture · Transmit</p>
</header>

<div class="panel">
  <div class="status-group">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-label" id="statusLabel">Standby</div>
    <div class="rec-badge" id="recBadge">
      <div class="rec-dot"></div> Live
    </div>
  </div>

  <div class="btn-group">
    <button class="btn btn-start" onclick="startShare()">▶ Start Share</button>
    <button class="btn btn-stop" id="stopBtn" onclick="stopShare()" disabled>■ Stop</button>
    <input type="text" id="roomCode" placeholder="Enter room code" style="padding:4px; font-size:12px;">
    <button class="btn btn-connect" onclick="joinRoom()">Join Room</button>
  </div>
</div>

<div class="video-container" id="videoBox">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="idle-placeholder" id="idlePlaceholder">
    <div class="idle-icon"></div>
    <div class="idle-text">No active stream</div>
  </div>
  <video id="screen" autoplay playsinline></video>
  <video id="friendScreen" autoplay playsinline></video>
</div>

<div class="info-bar">
  <div class="info-item">Protocol <span class="val">WebRTC</span></div>
  <div class="divider"></div>
  <div class="info-item">Codec <span class="val">H.264</span></div>
  <div class="divider"></div>
  <div class="info-item">Resolution <span class="val" id="resVal">—</span></div>
  <div class="divider"></div>
  <div class="info-item">Engine <span class="val" style="color: var(--orange);">Rust 🦀</span></div>
</div>
</div>

<script>
// ===== P2P SCREEN SHARE WITH ROOM CODE =====
let currentStream = null;
let peer = null;

async function startShare() {
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
    currentStream = stream;
    const video = document.getElementById('screen');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('idlePlaceholder').classList.add('hidden');
    document.getElementById('statusDot').classList.add('active');
    document.getElementById('statusLabel').classList.add('active');
    document.getElementById('statusLabel').textContent = 'Streaming';
    document.getElementById('recBadge').classList.add('visible');
    document.getElementById('stopBtn').disabled = false;

    const track = stream.getVideoTracks()[0];
    const settings = track.getSettings();
    if (settings.width && settings.height) {
      document.getElementById('resVal').textContent = settings.width + '×' + settings.height;
    }
    track.addEventListener('ended', () => stopShare());
  } catch(err) {
    console.warn('Screen share cancelled or denied:', err);
  }
}

function stopShare() {
  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
    currentStream = null;
  }
  const video = document.getElementById('screen');
  video.srcObject = null;
  video.style.display = 'none';
  document.getElementById('idlePlaceholder').classList.remove('hidden');
  document.getElementById('statusDot').classList.remove('active');
  document.getElementById('statusLabel').classList.remove('active');
  document.getElementById('statusLabel').textContent = 'Standby';
  document.getElementById('recBadge').classList.remove('visible');
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('resVal').textContent = '—';
}

function joinRoom() {
  const code = document.getElementById('roomCode').value.trim();
  if (!code) return alert('Enter a valid room code!');
  
  peer = new Peer(code); // use the room code as your Peer ID

  // when friend calls
  peer.on('call', call => {
    if (!currentStream) return alert('You must start your screen first!');
    call.answer(currentStream);
    call.on('stream', friendStream => {
      const friendVideo = document.getElementById('friendScreen');
      friendVideo.srcObject = friendStream;
      friendVideo.style.display = 'block';
    });
  });

  // call the other peer (if they are already online)
  const friendStream = currentStream;
  const friendCall = peer.connect(code);
  console.log('Ready! Share your room code with your friend.');
}
</script>
</body>
</html>
